<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnTraq — Content System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --yellow: #F0C844;
  --yellow-dim: #C0A036;
  --yellow-light: #F3D369;
  --black: #000000;
  --black1: #242424;
  --black2: #1A1A1A;
  --gray1: #767676;
  --gray2: #a0a0a0;
  --gray3: #CBCBCB;
  --gray4: #e0e0e0;
  --white1: #f2f2f2;
  --white2: #FAFAFA;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Open Sans', sans-serif;
  background: var(--black);
  color: var(--gray4);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(240,200,68,0.1);
  padding: 0 24px;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.logo {
  text-decoration: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
}

.logo-svg {
  height: 28px;
  width: auto;
}

.header-subtitle {
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: var(--gray2);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ─── FOOTER ─── */
.site-footer {
  border-top: 1px solid rgba(240,200,68,0.08);
  padding: 40px 24px;
  text-align: center;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.footer-logo-svg {
  height: 24px;
  width: auto;
  opacity: 0.5;
}

.footer-text {
  font-family: 'Open Sans', sans-serif;
  font-size: 11px;
  color: var(--gray1);
  letter-spacing: 0.5px;
}

/* ─── BREADCRUMB ─── */
.breadcrumb {
  padding: 16px 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.breadcrumb-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 500;
}

.breadcrumb a, .breadcrumb span.link {
  color: var(--gray2);
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
}

.breadcrumb a:hover, .breadcrumb span.link:hover {
  color: var(--yellow);
}

.breadcrumb .sep {
  color: var(--gray1);
  font-size: 11px;
}

.breadcrumb .current {
  color: var(--yellow);
}

/* ─── MAIN CONTENT ─── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ─── HOME PAGE ─── */
.page-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 36px;
  color: var(--white1);
  margin-bottom: 8px;
}

.page-subtitle {
  font-size: 16px;
  color: var(--gray2);
  margin-bottom: 48px;
  max-width: 500px;
  line-height: 1.6;
}

.page-subtitle span {
  color: var(--yellow);
  font-weight: 600;
}

.weeks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.week-card {
  background: var(--black2);
  border: 1px solid var(--black1);
  border-radius: 12px;
  padding: 28px 24px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.week-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--yellow);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.week-card:hover {
  border-color: rgba(240,200,68,0.3);
  transform: translateY(-2px);
}

.week-card:hover::before {
  transform: scaleX(1);
}

.week-card.has-content {
  border-color: var(--black1);
}

.week-card.placeholder {
  opacity: 0.35;
  cursor: default;
}

.week-card.placeholder:hover {
  border-color: var(--black1);
  transform: none;
}

.week-card.placeholder::before {
  display: none;
}

.week-number {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--yellow);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.week-theme {
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 18px;
  color: var(--white1);
  margin-bottom: 12px;
  line-height: 1.3;
}

.week-meta {
  font-size: 13px;
  color: var(--gray1);
}

.week-meta span {
  color: var(--gray2);
}

.week-badge {
  display: inline-block;
  margin-top: 16px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 1px;
}

.week-badge.live {
  background: rgba(240,200,68,0.12);
  color: var(--yellow);
  border: 1px solid rgba(240,200,68,0.25);
}

.week-badge.coming {
  background: rgba(118,118,118,0.1);
  color: var(--gray1);
  border: 1px solid rgba(118,118,118,0.2);
}

/* ─── WEEK PAGE ─── */
.week-header {
  margin-bottom: 40px;
}

.week-page-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 28px;
  color: var(--white1);
  margin-bottom: 4px;
}

.week-page-theme {
  font-size: 15px;
  color: var(--gray2);
}

.posts-list {
  display: flex;
  flex-direction: column;
  gap: 64px;
}

.post-item {
  display: grid;
  grid-template-columns: 400px 1fr;
  gap: 40px;
  align-items: start;
}

@media (max-width: 860px) {
  .post-item {
    grid-template-columns: 1fr;
    gap: 20px;
  }
}

.post-visual {
  width: 100%;
  border-radius: 8px;
  overflow: hidden;
  background: var(--black2);
  border: 1px solid var(--black1);
}

.post-visual img, .post-visual svg, .post-visual object {
  width: 100%;
  height: auto;
  display: block;
}

.post-content {
  padding-top: 8px;
}

.post-number {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: var(--yellow);
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.post-headline {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--white1);
  margin-bottom: 16px;
  line-height: 1.3;
}

.post-caption {
  font-size: 14px;
  line-height: 1.75;
  color: var(--gray3);
  white-space: pre-wrap;
  margin-bottom: 20px;
  max-height: 300px;
  overflow-y: auto;
  padding-right: 8px;
}

.post-caption::-webkit-scrollbar {
  width: 4px;
}

.post-caption::-webkit-scrollbar-track {
  background: transparent;
}

.post-caption::-webkit-scrollbar-thumb {
  background: var(--black1);
  border-radius: 2px;
}

.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: transparent;
  border: 1px solid var(--yellow);
  border-radius: 8px;
  color: var(--yellow);
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  letter-spacing: 0.5px;
}

.copy-btn:hover {
  background: rgba(240,200,68,0.08);
}

.copy-btn .copy-icon {
  width: 16px;
  height: 16px;
}

.copy-btn .copied-indicator {
  position: absolute;
  right: -70px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: var(--yellow-light);
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
}

.copy-btn .copied-indicator.show {
  opacity: 1;
}

.post-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.download-btn-wrap {
  margin-top: 10px;
}

.download-btn-wrap .download-btn {
  width: 100%;
  justify-content: center;
}

/* ─── POST DIVIDER ─── */
.post-divider {
  height: 1px;
  background: var(--black1);
  margin: 0;
  border: none;
}

/* ─── BACK BUTTON ─── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray2);
  cursor: pointer;
  margin-bottom: 24px;
  transition: color 0.2s;
  background: none;
  border: none;
  padding: 0;
}

.back-btn:hover {
  color: var(--yellow);
}

/* ─── ANIMATIONS ─── */
.fade-in {
  animation: fadeIn 0.4s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.stagger-1 { animation-delay: 0.05s; opacity: 0; }
.stagger-2 { animation-delay: 0.1s; opacity: 0; }
.stagger-3 { animation-delay: 0.15s; opacity: 0; }
.stagger-4 { animation-delay: 0.2s; opacity: 0; }
.stagger-5 { animation-delay: 0.25s; opacity: 0; }
.stagger-6 { animation-delay: 0.3s; opacity: 0; }
.stagger-7 { animation-delay: 0.35s; opacity: 0; }
.stagger-8 { animation-delay: 0.4s; opacity: 0; }
.stagger-9 { animation-delay: 0.45s; opacity: 0; }
.stagger-10 { animation-delay: 0.5s; opacity: 0; }
.stagger-11 { animation-delay: 0.55s; opacity: 0; }
.stagger-12 { animation-delay: 0.6s; opacity: 0; }

/* ─── RESPONSIVE ─── */
@media (max-width: 640px) {
  .site-header { padding: 0 16px; }
  .breadcrumb { padding: 12px 16px; }
  .main { padding: 0 16px 60px; }
  .page-title { font-size: 26px; }
  .page-subtitle { font-size: 14px; margin-bottom: 32px; }
  .weeks-grid { grid-template-columns: 1fr; gap: 12px; }
  .week-card { padding: 20px; }
  .week-theme { font-size: 16px; }
  .post-visual { max-width: 100%; }
  .week-page-title { font-size: 22px; }
  .post-headline { font-size: 17px; }
  .post-caption { font-size: 13px; }
  .header-subtitle { display: none; }
}
</style>
</head>

// ─── ROUTER ───
let currentView = 'home';

function navigate(view, weekNum) {
  if (view === 'home') {
    currentView = 'home';
    renderHome();
    updateBreadcrumb();
  } else if (view === 'week') {
    currentView = 'week';
    renderWeek(weekNum);
    updateBreadcrumb(weekNum);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateBreadcrumb(weekNum) {
  const bc = document.getElementById('breadcrumb-inner');
  if (currentView === 'home') {
    bc.innerHTML = `<span class="current">Content System</span>`;
  } else {
    const week = WEEKS_DATA.find(w => w.week === weekNum);
    bc.innerHTML = `
      <span class="link" onclick="navigate('home')">Content System</span>
      <span class="sep">›</span>
      <span class="current">Week ${weekNum} — ${week.theme}</span>
    `;
  }
}

// ─── RENDER HOME ───
function renderHome() {
  const app = document.getElementById('app');
  const totalPosts = WEEKS_DATA.reduce((sum, w) => sum + w.posts.length, 0);
  const liveWeeks = WEEKS_DATA.filter(w => w.status === 'live' && w.posts.length > 0).length;

  let html = `
    <div class="fade-in">
      <h1 class="page-title">Content System</h1>
      <p class="page-subtitle">
        <span>${totalPosts} posts</span> across <span>${liveWeeks} weeks</span> — organized for review and deployment.
      </p>
    </div>
    <div class="weeks-grid">
  `;

  WEEKS_DATA.forEach((week, i) => {
    const hasContent = week.posts.length > 0;
    const cardClass = hasContent ? 'has-content' : 'placeholder';
    const clickHandler = hasContent ? `onclick="navigate('week', ${week.week})"` : '';

    html += `
      <div class="week-card ${cardClass} fade-in stagger-${i + 1}" ${clickHandler}>
        <div class="week-number">Week ${week.week}</div>
        <div class="week-theme">${week.theme}</div>
        <div class="week-meta">${hasContent ? `<span>${week.posts.length} posts</span>` : 'No posts yet'}</div>
        <span class="week-badge ${week.status}">${week.status === 'live' ? 'READY' : 'COMING SOON'}</span>
      </div>
    `;
  });

  html += `</div>`;
  app.innerHTML = html;
}

// ─── RENDER WEEK ───
function renderWeek(weekNum) {
  const app = document.getElementById('app');
  const week = WEEKS_DATA.find(w => w.week === weekNum);

  if (!week || week.posts.length === 0) {
    app.innerHTML = `
      <button class="back-btn fade-in" onclick="navigate('home')">← Back</button>
      <div class="fade-in stagger-1">
        <h1 class="week-page-title">Week ${weekNum}</h1>
        <p class="week-page-theme" style="margin-top: 16px; color: var(--gray1);">Content coming soon.</p>
      </div>
    `;
    return;
  }

  // Calculate global post number
  let globalPostStart = 0;
  for (let i = 0; i < WEEKS_DATA.length; i++) {
    if (WEEKS_DATA[i].week === weekNum) break;
    globalPostStart += WEEKS_DATA[i].posts.length;
  }

  let html = `
    <button class="back-btn fade-in" onclick="navigate('home')">← All Weeks</button>
    <div class="week-header fade-in stagger-1">
      <h1 class="week-page-title">Week ${weekNum}</h1>
      <p class="week-page-theme">${week.theme} · ${week.posts.length} posts</p>
    </div>
    <div class="posts-list">
  `;

  week.posts.forEach((post, i) => {
    const postNum = globalPostStart + i + 1;
    const stagger = i + 2;

    html += `
      <div class="post-item fade-in stagger-${stagger}">
        <div class="post-visual">
          <img src="${post.file}" alt="Post ${postNum}" loading="lazy" style="width:100%;height:auto;"/>
          <div class="download-btn-wrap">
            <button class="copy-btn download-btn" onclick="downloadImage('${post.file}', 'OnTraq-Post-${postNum}')">
              <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Download Image
            </button>
          </div>
        </div>
        <div class="post-content">
          <div class="post-number">POST ${postNum}</div>
          <h3 class="post-headline">${post.headline}</h3>
          <div class="post-caption">${escapeHtml(post.caption)}</div>
          <div class="post-actions">
            <button class="copy-btn" onclick="copyCaption(this, ${postNum - 1})">
              <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
              Copy Caption
              <span class="copied-indicator" id="copied-${postNum}">Copied!</span>
            </button>
          </div>
        </div>
      </div>
    `;

    if (i < week.posts.length - 1) {
      html += `<hr class="post-divider fade-in stagger-${stagger}">`;
    }
  });

  html += `</div>`;

  // Week navigation
  const prevWeek = WEEKS_DATA.find(w => w.week === weekNum - 1 && w.posts.length > 0);
  const nextWeek = WEEKS_DATA.find(w => w.week === weekNum + 1 && w.posts.length > 0);

  html += `<div style="display:flex;justify-content:space-between;margin-top:64px;padding-top:32px;border-top:1px solid var(--black1);" class="fade-in stagger-${week.posts.length + 2}">`;

  if (prevWeek) {
    html += `<button class="back-btn" onclick="navigate('week', ${prevWeek.week})">← Week ${prevWeek.week}</button>`;
  } else {
    html += `<div></div>`;
  }

  if (nextWeek) {
    html += `<button class="back-btn" onclick="navigate('week', ${nextWeek.week})" style="flex-direction:row-reverse;">Week ${nextWeek.week} →</button>`;
  } else {
    html += `<div></div>`;
  }

  html += `</div>`;

  app.innerHTML = html;
}

// ─── HELPERS ───
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// All captions flat array for copying
function getAllCaptions() {
  const all = [];
  WEEKS_DATA.forEach(w => w.posts.forEach(p => all.push(p.caption)));
  return all;
}

function copyCaption(btn, index) {
  const captions = getAllCaptions();
  const text = captions[index];
  navigator.clipboard.writeText(text).then(() => {
    const indicator = btn.querySelector('.copied-indicator');
    indicator.classList.add('show');
    setTimeout(() => indicator.classList.remove('show'), 2000);
  });
}

function downloadImage(svgPath, filename) {
  fetch(svgPath)
    .then(r => r.text())
    .then(svgText => {
      const canvas = document.createElement('canvas');
      canvas.width = 1080;
      canvas.height = 1080;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      const svgBlob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);
      img.onload = function() {
        ctx.drawImage(img, 0, 0, 1080, 1080);
        URL.revokeObjectURL(url);
        canvas.toBlob(function(blob) {
          const dlUrl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = dlUrl;
          a.download = filename + '.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(dlUrl);
        }, 'image/png');
      };
      img.src = url;
    });
}
