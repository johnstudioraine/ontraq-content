<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="g28bg" x1="0" y1="0" x2="0" y2="1080">
    <stop offset="0%" stop-color="#080808"/>
    <stop offset="100%" stop-color="#0e0e0e"/>
  </linearGradient>
  <filter id="glow28"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glow28sm"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<rect width="1080" height="1080" fill="url(#g28bg)"/>

<!-- Section label -->
<text x="540" y="80" font-family="Montserrat, sans-serif" font-weight="700" font-size="18" fill="#F0C844" text-anchor="middle" letter-spacing="6">WHY ONTRAQ</text>
<rect x="470" y="95" width="140" height="2" rx="1" fill="#F0C844" opacity="0.3"/>

<!-- ═══ THREE VERTICAL PANELS ═══ -->

<!-- PANEL 1: MARKERLESS — motion trajectory paths (no figure) -->
<rect x="50" y="140" width="300" height="440" rx="10" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>

<!-- Abstract motion trajectory visualization -->
<g transform="translate(200, 300)" filter="url(#glow28)">
  <!-- Multiple trajectory curves representing captured motion data -->
  <path d="M-80,60 Q-60,20 -30,-30 Q0,-80 30,-60 Q60,-40 80,10" fill="none" stroke="#F0C844" stroke-width="2.5" opacity="0.9"/>
  <path d="M-80,70 Q-55,30 -25,-20 Q5,-65 35,-50 Q65,-30 80,20" fill="none" stroke="#F3D369" stroke-width="1.5" opacity="0.4"/>
  <path d="M-80,50 Q-65,10 -35,-35 Q-5,-85 25,-65 Q55,-45 80,5" fill="none" stroke="#C0A036" stroke-width="1.5" opacity="0.3"/>

  <!-- Data capture points along trajectory -->
  <circle cx="-60" cy="30" r="5" fill="#F0C844" filter="url(#glow28sm)"/>
  <circle cx="-30" cy="-30" r="6" fill="#F0C844" filter="url(#glow28sm)"/>
  <circle cx="0" cy="-75" r="5" fill="#F0C844" filter="url(#glow28sm)"/>
  <circle cx="30" cy="-60" r="6" fill="#F0C844" filter="url(#glow28sm)"/>
  <circle cx="60" cy="-35" r="5" fill="#F0C844" filter="url(#glow28sm)"/>

  <!-- Velocity vectors (small arrows at data points) -->
  <line x1="-30" y1="-30" x2="-18" y2="-50" stroke="#F0C844" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="-75" x2="12" y2="-72" stroke="#F0C844" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="-60" x2="42" y2="-50" stroke="#F0C844" stroke-width="1" opacity="0.5"/>

  <!-- Coordinate reference lines -->
  <line x1="-90" y1="80" x2="90" y2="80" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="-90" y1="80" x2="-90" y2="-90" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Axis ticks -->
  <line x1="-60" y1="80" x2="-60" y2="75" stroke="#333" stroke-width="1"/>
  <line x1="-30" y1="80" x2="-30" y2="75" stroke="#333" stroke-width="1"/>
  <line x1="0" y1="80" x2="0" y2="75" stroke="#333" stroke-width="1"/>
  <line x1="30" y1="80" x2="30" y2="75" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="80" x2="60" y2="75" stroke="#333" stroke-width="1"/>
</g>

<!-- No markers crossed out icon -->
<g transform="translate(120, 450)">
  <circle cx="0" cy="0" r="14" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="0" cy="0" r="4" fill="#555"/>
  <line x1="-18" y1="-18" x2="18" y2="18" stroke="#F0C844" stroke-width="2"/>
</g>
<text x="150" y="455" font-family="Open Sans, sans-serif" font-weight="400" font-size="13" fill="#a0a0a0">No markers needed</text>

<text x="200" y="530" font-family="Montserrat, sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">Markerless</text>
<text x="200" y="558" font-family="Montserrat, sans-serif" font-weight="700" font-size="22" fill="#F0C844" text-anchor="middle">Tracking</text>

<!-- PANEL 2: REAL ENVIRONMENTS — gym/field/clinic icons -->
<rect x="390" y="140" width="300" height="440" rx="10" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>

<!-- Three environment icons stacked -->
<!-- Gym: dumbbell -->
<g transform="translate(540, 240)" filter="url(#glow28sm)">
  <rect x="-50" y="-8" width="100" height="16" rx="8" fill="none" stroke="#F0C844" stroke-width="2"/>
  <rect x="-60" y="-16" width="18" height="32" rx="4" fill="none" stroke="#F0C844" stroke-width="2"/>
  <rect x="42" y="-16" width="18" height="32" rx="4" fill="none" stroke="#F0C844" stroke-width="2"/>
</g>
<text x="540" y="275" font-family="Open Sans, sans-serif" font-weight="400" font-size="12" fill="#767676" text-anchor="middle">GYM</text>

<!-- Field: goal posts -->
<g transform="translate(540, 330)" filter="url(#glow28sm)">
  <line x1="-35" y1="20" x2="-35" y2="-20" stroke="#F0C844" stroke-width="2"/>
  <line x1="35" y1="20" x2="35" y2="-20" stroke="#F0C844" stroke-width="2"/>
  <line x1="-35" y1="-20" x2="-20" y2="-35" stroke="#F0C844" stroke-width="2"/>
  <line x1="35" y1="-20" x2="20" y2="-35" stroke="#F0C844" stroke-width="2"/>
  <line x1="-20" y1="-35" x2="20" y2="-35" stroke="#F0C844" stroke-width="2"/>
  <!-- Field line -->
  <line x1="-50" y1="20" x2="50" y2="20" stroke="#F0C844" stroke-width="1" opacity="0.4"/>
</g>
<text x="540" y="375" font-family="Open Sans, sans-serif" font-weight="400" font-size="12" fill="#767676" text-anchor="middle">FIELD</text>

<!-- Clinic: cross -->
<g transform="translate(540, 425)" filter="url(#glow28sm)">
  <rect x="-8" y="-25" width="16" height="50" rx="3" fill="none" stroke="#F0C844" stroke-width="2"/>
  <rect x="-25" y="-8" width="50" height="16" rx="3" fill="none" stroke="#F0C844" stroke-width="2"/>
</g>
<text x="540" y="465" font-family="Open Sans, sans-serif" font-weight="400" font-size="12" fill="#767676" text-anchor="middle">CLINIC</text>

<text x="540" y="530" font-family="Montserrat, sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">Real</text>
<text x="540" y="558" font-family="Montserrat, sans-serif" font-weight="700" font-size="22" fill="#F0C844" text-anchor="middle">Environments</text>

<!-- PANEL 3: CONSISTENT DATA — overlapping session curves -->
<rect x="730" y="140" width="300" height="440" rx="10" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>

<!-- Session comparison graph -->
<g transform="translate(730, 200)">
  <!-- Grid -->
  <line x1="30" y1="0" x2="30" y2="220" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="30" y1="220" x2="270" y2="220" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Horizontal grid lines -->
  <line x1="30" y1="55" x2="270" y2="55" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="30" y1="110" x2="270" y2="110" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="30" y1="165" x2="270" y2="165" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Session 1 curve -->
  <polyline points="30,180 70,140 110,155 150,100 190,120 230,80 270,95" fill="none" stroke="#F0C844" stroke-width="2" opacity="0.9" filter="url(#glow28sm)"/>
  <!-- Session 2 curve - nearly identical -->
  <polyline points="30,185 70,145 110,150 150,105 190,118 230,85 270,90" fill="none" stroke="#F3D369" stroke-width="2" opacity="0.5"/>
  <!-- Session 3 curve -->
  <polyline points="30,175 70,138 110,158 150,98 190,125 230,78 270,98" fill="none" stroke="#C0A036" stroke-width="2" opacity="0.35"/>

  <!-- Data points on main curve -->
  <circle cx="70" cy="140" r="4" fill="#F0C844" filter="url(#glow28sm)"/>
  <circle cx="150" cy="100" r="4" fill="#F0C844" filter="url(#glow28sm)"/>
  <circle cx="230" cy="80" r="4" fill="#F0C844" filter="url(#glow28sm)"/>

  <!-- Legend -->
  <rect x="50" y="240" width="12" height="3" rx="1" fill="#F0C844" opacity="0.9"/>
  <text x="68" y="244" font-family="Open Sans, sans-serif" font-weight="400" font-size="10" fill="#767676">Session 1</text>
  <rect x="130" y="240" width="12" height="3" rx="1" fill="#F3D369" opacity="0.5"/>
  <text x="148" y="244" font-family="Open Sans, sans-serif" font-weight="400" font-size="10" fill="#767676">Session 2</text>
  <rect x="210" y="240" width="12" height="3" rx="1" fill="#C0A036" opacity="0.35"/>
  <text x="228" y="244" font-family="Open Sans, sans-serif" font-weight="400" font-size="10" fill="#767676">Session 3</text>
</g>

<!-- Consistency indicator -->
<rect x="790" y="470" width="180" height="28" rx="14" fill="rgba(240,200,68,0.08)" stroke="rgba(240,200,68,0.25)" stroke-width="1"/>
<text x="880" y="489" font-family="Montserrat, sans-serif" font-weight="600" font-size="12" fill="#F0C844" text-anchor="middle" letter-spacing="1">VARIANCE &lt; 2%</text>

<text x="880" y="530" font-family="Montserrat, sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">Consistent</text>
<text x="880" y="558" font-family="Montserrat, sans-serif" font-weight="700" font-size="22" fill="#F0C844" text-anchor="middle">Data</text>

<!-- ═══ HEADLINE ═══ -->
<text x="80" y="700" font-family="Montserrat, sans-serif" font-weight="800" font-size="48" fill="white" letter-spacing="-1">Why OnTraq: Markerless,</text>
<text x="80" y="760" font-family="Montserrat, sans-serif" font-weight="800" font-size="48" fill="white" letter-spacing="-1">Real Environments,</text>
<text x="80" y="820" font-family="Montserrat, sans-serif" font-weight="800" font-size="48" fill="#F0C844" letter-spacing="-1">Consistent Data.</text>

<!-- Subtext -->
<text x="80" y="885" font-family="Open Sans, sans-serif" font-weight="400" font-size="21" fill="#a0a0a0">That's what research-grade motion capture</text>
<text x="80" y="915" font-family="Open Sans, sans-serif" font-weight="400" font-size="21" fill="#a0a0a0">looks like in practice.</text>

<!-- Footer -->

